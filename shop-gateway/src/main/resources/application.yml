server:
  port: 8090

spring:
  application:
    name: shop-gateway
  config:
    import: optional:nacos:${spring.application.name}.yaml
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        username: nacos
        password: nacos
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yaml
        username: nacos
        password: nacos
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: auth-service
          uri: lb://shop-auth
          predicates:
            - Path=/auth/**
        - id: product-service
          uri: lb://shop-product
          predicates:
            - Path=/product/**
        - id: order-service
          uri: lb://shop-order
          predicates:
            - Path=/order/**
    sentinel:
      transport:
        dashboard: 127.0.0.1:8080
      eager: true
